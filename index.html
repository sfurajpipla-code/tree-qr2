<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFU Research Trees</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; border-top: 4px solid transparent; }
        .card-id { border-top-color: var(--primary); }
        h2 { margin: 0 0 10px 0; font-size: 1.1rem; color: var(--primary); font-weight: 700; text-transform: uppercase; }
        
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 10px; }
        
        .parsing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .parse-box { background: #fff; border: 1px solid #e0e0e0; padding: 8px; border-radius: 6px; }
        .full-width { grid-column: span 2; background: #e8f5e9; border-color: var(--primary); }

        .label-text { font-size: 0.65rem; color: #777; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 2px; }
        .value-text { font-size: 0.95rem; font-weight: bold; color: #222; word-break: break-word; line-height: 1.2; }

        label { display: block; margin: 10px 0 5px; font-weight: 600; font-size: 0.9rem; }
        input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .check-item { display: flex; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .check-item input { width: 18px; height: 18px; margin-right: 10px; accent-color: var(--primary); }
        .check-item label { margin: 0; font-size: 0.85rem; }

        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s; font-size: 1rem; }
        .btn-scan { background: #333; color: white; }
        .btn-save { background: var(--primary); color: white; margin-top: 15px; }
        .btn-sync { background: var(--secondary); color: white; margin-top: 10px; }
        
        .status-footer { text-align: center; font-size: 0.8rem; color: #777; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        .badge { background: #ff5252; color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. QR Scanner</h2>
        <div id="reader"></div>
        <button id="scanBtn" class="btn-scan" onclick="toggleScanner()">START CAMERA</button>
    </div>

    <div class="card card-id">
        <h2>2. Identification</h2>
        <div class="parsing-grid">
            <div class="parse-box full-width">
                <span class="label-text">Species Name</span>
                <span id="displaySpecies" class="value-text">---</span>
            </div>
            <div class="parse-box">
                <span class="label-text">Range</span>
                <span id="valRange" class="value-text">-</span>
            </div>
            <div class="parse-box">
                <span class="label-text">Plot Code</span>
                <span id="valPlot" class="value-text">-</span>
            </div>
            <div class="parse-box">
                <span class="label-text">Block No</span>
                <span id="valBlock" class="value-text">-</span>
            </div>
            <div class="parse-box">
                <span class="label-text">Tree No</span>
                <span id="valTreeNo" class="value-text">-</span>
            </div>
            <div class="parse-box full-width">
                <span class="label-text">CPT / Clone</span>
                <span id="valCpt" class="value-text">-</span>
            </div>
        </div>

        <label>Height (Meters)</label>
        <input type="number" id="height" inputmode="decimal" placeholder="0.00">

        <label>Girth (Centimeters)</label>
        <input type="number" id="girth" inputmode="decimal" placeholder="00.0">

        <label>Observations</label>
        <div class="checkbox-group">
            <div class="check-item"><input type="checkbox" id="flowering"><label for="flowering">Flowering</label></div>
            <div class="check-item"><input type="checkbox" id="fruiting"><label for="fruiting">Fruiting</label></div>
            <div class="check-item"><input type="checkbox" id="termites"><label for="termites">Termites</label></div>
            <div class="check-item"><input type="checkbox" id="disease"><label for="disease">Disease</label></div>
            <div class="check-item"><input type="checkbox" id="forking"><label for="forking">Forking</label></div>
            <div class="check-item"><input type="checkbox" id="buttress"><label for="buttress">Buttress</label></div>
        </div>

        <button class="btn-save" onclick="saveToPhone()">SAVE LOCALLY</button>
    </div>

    <div class="card">
        <div class="status-footer">
            Saved Offline: <span id="count" class="badge">0</span>
        </div>
        <button class="btn-sync" onclick="syncToGoogle()">SYNC TO GOOGLE SHEETS</button>
    </div>

    <script>
        let html5QrCode;
        let currentUid = "";
        let currentSpecies = "";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6Wq08OfuYrZ2kWdT7iwSflwUvfgzjucEQSnzjd-R0l7r9qUFzWfT_39CSN4jPrhkg/exec";

        // --- NEW: AUTO-PRELOAD DATA FROM URL ON LOAD ---
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlUid = urlParams.get('uid'); // Captures data if redirected from phone camera [cite: 40]
            
            if (urlUid) {
                processScannedId(urlUid);
                // Cleans address bar to prevent re-fill on refresh
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            updateCount();
        };

        // --- CORE PARSING LOGIC (Shared by Manual & Auto-Redirect) ---
        function processScannedId(decodedText) {
            try {
                let rawId = decodedText;
                // If the QR is a URL, extract the 'uid' parameter [cite: 39, 40]
                if (decodedText.includes('uid=')) {
                    const url = new URL(decodedText);
                    rawId = url.searchParams.get("uid");
                }
                
                currentUid = rawId;
                const parts = currentUid.split('_'); // Format: Range_Plot_Block_Species_CPT_TreeNo [cite: 41]
                
                // Update UI Identification Section [cite: 30, 41, 42, 43]
                document.getElementById('valRange').innerText = parts[0] || "-";
                document.getElementById('valPlot').innerText  = parts[1] || "-";
                document.getElementById('valBlock').innerText = parts[2] || "-";
                document.getElementById('displaySpecies').innerText = parts[3] || "Unknown";
                document.getElementById('valCpt').innerText   = parts[4] || "-";
                document.getElementById('valTreeNo').innerText = parts[5] || "-";
                
                currentSpecies = parts[3] || "Unknown";
                
                // Alert confirmation [cite: 43]
                if (parts[5]) alert("Scanned Tree No: " + parts[5]);

            } catch(e) {
                alert("Parsing Error. Ensure QR format is Range_Plot_Block_Species_CPT_TreeNo"); 
            }
        }

        // --- MANUAL SCANNER CONTROL ---
        function toggleScanner() {
            if (!html5QrCode) { html5QrCode = new Html5Qrcode("reader"); } 
            const config = { fps: 15, qrbox: { width: 250, height: 250 } }; 
            
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                processScannedId(decodedText);
                html5QrCode.stop(); 
            }).catch(err => { alert("Camera Error: Please check permissions."); }); 
        }

        function saveToPhone() {
            const h = document.getElementById('height').value; 
            const g = document.getElementById('girth').value; 

            if (!currentUid || !h || !g) {
                alert("Please scan a tree and enter measurements first."); 
                return;
            }

            const record = {
                uid: currentUid,
                species: currentSpecies,
                height: h,
                girth: g,
                flowering: document.getElementById('flowering').checked, 
                fruiting: document.getElementById('fruiting').checked,
                termites: document.getElementById('termites').checked,
                disease: document.getElementById('disease').checked,
                forking: document.getElementById('forking').checked,
                buttress: document.getElementById('buttress').checked,
                time: new Date().toLocaleString()
            };

            let storage = JSON.parse(localStorage.getItem('treeData') || "[]"); 
            storage.push(record);
            localStorage.setItem('treeData', JSON.stringify(storage)); 

            alert("Saved locally!");
            resetForm();
        }

        function resetForm() {
            // UI Reset for next scan [cite: 51, 52]
            ["height", "girth"].forEach(id => document.getElementById(id).value = "");
            ["flowering", "fruiting", "termites", "disease", "forking", "buttress"].forEach(id => document.getElementById(id).checked = false);
            ["displaySpecies", "valRange", "valPlot", "valBlock", "valTreeNo", "valCpt"].forEach(id => document.getElementById(id).innerText = "-");
            currentUid = ""; 
            updateCount();
        }

        function updateCount() {
            const storage = JSON.parse(localStorage.getItem('treeData') || "[]"); 
            document.getElementById('count').innerText = storage.length; 
        }

        async function syncToGoogle() {
            const storage = JSON.parse(localStorage.getItem('treeData') || "[]"); 
            if (storage.length === 0) { alert("Nothing to sync."); return; } 
            if (!confirm(`Sync ${storage.length} records?`)) return; 

            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(storage) 
                }); 
                alert("Upload Successful! Phone memory cleared."); 
                localStorage.setItem('treeData', "[]");
                updateCount();
            } catch (e) {
                alert("Upload failed. Check your internet connection."); 
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); 
        }
        updateCount(); 
    </script>
</body>
</html>
